<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond Earth</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: hotpink;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #111;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
    }

    nav {
      text-align: center;
      margin-top: 10px;
    }

    nav a {
      color: #00ffff;
      margin: 0 10px;
      text-decoration: none;
    }

    .section {
      padding: 20px;
      text-align: center;
    }

    .card {
      background-color: #222;
      margin: 15px auto;
      padding: 15px;
      max-width: 300px;
      border-radius: 10px;
    }

    footer {
      background-color: #111;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .card {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Beyond Earth</h1>
    <nav>
      <a href="#explore">Explore</a>
      <a href="#missions">Missions</a>
      <a href="#future">Future</a>
    </nav>
  </header>

  <div class="section" id="explore">
    <h2>Explore Space</h2>
    <div class="card">
      <p>Learn about planets, stars, and galaxies in the universe.</p>
    </div>
  </div>

  <div class="section" id="missions">
    <h2>Space Missions</h2>
    <div class="card">
      <p>Discover famous missions like Apollo and Voyager.</p>
    </div>
  </div>

  <div class="section" id="future">
    <h2>The Future</h2>
    <div class="card">
      <p>Find out what’s coming next in space exploration.</p>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Beyond Earth</p>
  </footer>

</body>
</html>
